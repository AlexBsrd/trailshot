services:
  # --- Infrastructure (always active) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trailshot
      POSTGRES_USER: trailshot
      POSTGRES_PASSWORD: trailshot_dev
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/minio
    depends_on:
      - minio
    entrypoint: /bin/sh
    command: -c "sleep 3 && mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/trailshot && mc anonymous set download local/trailshot/previews && mc anonymous set download local/trailshot/thumbnails"
    restart: "no"

  # --- Dev profile ---
  api-dev:
    profiles: [dev]
    build:
      context: ./api
      target: dev
    volumes:
      - ./api/src:/app/src
      - ./api/nest-cli.json:/app/nest-cli.json
      - ./api/tsconfig.json:/app/tsconfig.json
      - ./api/tsconfig.build.json:/app/tsconfig.build.json
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: trailshot
      DB_PASSWORD: trailshot_dev
      DB_DATABASE: trailshot
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: trailshot
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      - postgres
      - minio-init

  web-dev:
    profiles: [dev]
    build:
      context: ./web
      target: dev
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/angular.json:/app/angular.json
      - ./web/tsconfig.json:/app/tsconfig.json
      - ./web/tsconfig.app.json:/app/tsconfig.app.json
      - ./web/proxy.conf.js:/app/proxy.conf.js
    ports:
      - "4202:4200"
    environment:
      API_URL: http://api-dev:3000
      STORAGE_URL: http://minio:9000
    depends_on:
      - api-dev

  # --- Prod profile ---
  api:
    profiles: [prod]
    build:
      context: ./api
      target: prod
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      - postgres
      - minio-init

  web:
    profiles: [prod]
    build:
      context: ./web
      target: prod
    environment:
      PORT: 4000
    depends_on:
      - api

  caddy:
    profiles: [prod]
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
